<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        .header{
            height: 80px;
        }
        .main{
            flex: 1;
            display: flex;
        }
        .sidebar{
            width: 240px;
        }
        .right{
            display: flex;
            flex: 1;
            flex-direction: column;
        }
        .tabs{
            height: 60px;
        }
        .content{
            flex: 1;
            overflow-y: auto;
        }
        .footer{
            height: 60px;
        }
    </style>
</head>
<body>
    <div class="container">

        <header class="header">
            Header
        </header>

        <main class="main">

            <aside class="sidebar">
                Sidebar
            </aside>

            <section class="right">

                <div class="tabs">
                    Tabs
                </div>

                <div class="content">
                    Content
                </div>

            </section>

        </main>

        <footer class="footer">
            Footer
        </footer>

    </div>
</body>
</html>
